name = "healing-practice-web"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"

[env.production]
name = "healing-practice-web"
routes = [
  { pattern = "healingpractice.co.uk/*", zone_name = "healingpractice.co.uk" },
  { pattern = "www.healingpractice.co.uk/*", zone_name = "healingpractice.co.uk" }
]

[env.staging]
name = "healing-practice-web-staging"
