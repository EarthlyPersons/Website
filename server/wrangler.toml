name = "healing-practice-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "healing-practice-api"
routes = [{ pattern = "api.healingpractice.co.uk/*", zone_name = "healingpractice.co.uk" }]

[env.staging]
name = "healing-practice-api-staging"

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 900 }

[build]
command = "npm run build"

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://www.healingpractice.co.uk"