name = "healing-practice-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "healing-practice-api"

[env.production.vars]
ENVIRONMENT = "production"

[env.staging]
name = "healing-practice-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 900 }

# Optional per-env: ALLOWED_ORIGIN (e.g. custom domain). workers.dev frontends are allowed in code by default.
# Secrets (Wrangler): npm run wrangler:secret:set <NAME>
# - FIREBASE_PROJECT_ID
# - FIREBASE_CLIENT_EMAIL
# - FIREBASE_PRIVATE_KEY
# - RESEND_API_KEY
# - ADMIN_NOTIFICATION_EMAIL
# - RESEND_FROM (optional verified sender in Resend)